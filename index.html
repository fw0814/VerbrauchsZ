<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ZählerApp</title>
<link rel="manifest" href="manifest.webmanifest">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1117;--s1:#1a1d27;--s2:#222636;--s3:#2a2f45;
  --t1:#f0f2ff;--t2:#8b90a7;--t3:#555a72;
  --acc:#3d8ef8;--acc2:#5ba3ff;
  --bor:rgba(255,255,255,0.07);--bor2:rgba(255,255,255,0.13);
  --warn-bg:rgba(251,191,36,0.12);--warn:#fbbf24;
  --ok-bg:rgba(52,211,153,0.12);--ok:#34d399;
  --err:#f87171;--err-bg:rgba(248,113,113,0.12);
  --wat:#22d3ee;--wat-bg:rgba(34,211,238,0.1);
  --hea:#fb923c;--hea-bg:rgba(251,146,60,0.1);
  --r:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}

/* ── SCREENS ── */
.scr{display:none;flex-direction:column;min-height:100vh}.scr.on{display:flex}

/* ── TOPBAR ── */
.top{background:var(--s1);border-bottom:1px solid var(--bor);padding:14px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:20}
.top h1{font-size:17px;font-weight:700;flex:1;letter-spacing:-.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acc-c{color:var(--acc2)}
.back{background:none;border:none;cursor:pointer;color:var(--acc2);font-size:14px;font-weight:600;padding:4px 0;display:flex;align-items:center;gap:2px;white-space:nowrap;flex-shrink:0}
.ib{background:var(--s2);border:1px solid var(--bor2);cursor:pointer;color:var(--t2);padding:8px;border-radius:10px;display:flex;align-items:center;font-size:18px;flex-shrink:0;transition:all .15s}
.ib:active{background:var(--s3);color:var(--t1)}

/* ── BREADCRUMB ── */
.bc{padding:8px 16px;background:var(--s1);border-bottom:1px solid var(--bor);font-size:12px;color:var(--t3);display:flex;align-items:center;gap:4px;flex-wrap:wrap;min-height:33px}
.bc .bi{color:var(--t2)}.bc .bs{opacity:.4}.bc .bx{color:var(--t1);font-weight:600}

/* ── CONTENT ── */
.cnt{flex:1;padding:14px;display:flex;flex-direction:column;gap:12px;padding-bottom:84px}

/* ── CARDS ── */
.card{background:var(--s1);border:1px solid var(--bor);border-radius:16px;overflow:hidden}
.cr{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid var(--bor);cursor:pointer;transition:background .1s}
.cr:last-child{border-bottom:none}
.cr:active{background:var(--s2)}
.iw{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:19px}
.ib-bld{background:linear-gradient(135deg,#1e3a6e,#2d5aa0);color:#7eb8ff}
.ib-are{background:linear-gradient(135deg,#2d1e6e,#6a2da0);color:#c4b5fd}
.ib-str{background:linear-gradient(135deg,#1e3a6e,#2d5aa0);color:#7eb8ff}
.ib-wat{background:linear-gradient(135deg,#0a3a4a,#0e6b8a);color:var(--wat)}
.ib-hea{background:linear-gradient(135deg,#4a1e0a,#8a3a0e);color:var(--hea)}
.ri{flex:1;min-width:0}
.rt{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rs{font-size:12px;color:var(--t2);margin-top:2px}
.ra{display:flex;align-items:center;gap:4px;flex-shrink:0}
.eb{background:none;border:none;cursor:pointer;color:var(--t3);padding:7px;border-radius:8px;font-size:16px;display:flex;transition:all .15s}
.eb:active{background:var(--s2);color:var(--t1)}
.db{background:none;border:none;cursor:pointer;color:var(--t3);padding:7px;border-radius:8px;font-size:16px;display:flex;transition:all .15s}
.db:active{background:var(--err-bg);color:var(--err)}

/* ── FAB ── */
.fab{position:fixed;bottom:22px;right:16px;width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,#2563eb,#3d8ef8);color:#fff;border:none;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(61,142,248,.4);z-index:10}

/* ── EMPTY ── */
.emp{text-align:center;padding:52px 20px;color:var(--t3)}
.emp i{font-size:52px;margin-bottom:14px;display:block;opacity:.35}
.emp p{font-size:14px;line-height:1.65;opacity:.7}

/* ── MODAL ── */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:flex-end}
.mo.on{display:flex}
.mb{background:var(--s1);border-radius:22px 22px 0 0;border-top:1px solid var(--bor2);padding:10px 16px 44px;width:100%;max-height:90vh;overflow-y:auto}
.mh{width:36px;height:4px;background:var(--s3);border-radius:2px;margin:0 auto 18px}
.mb h2{font-size:18px;font-weight:700;margin-bottom:18px}
.fl{margin-bottom:13px}
.fl label{font-size:11px;color:var(--t2);margin-bottom:5px;display:block;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fl input,.fl select{width:100%;padding:12px 13px;border:1px solid var(--bor2);border-radius:var(--r);font-size:16px;background:var(--s2);color:var(--t1);-webkit-appearance:none}
.fl input:focus,.fl select:focus{outline:none;border-color:var(--acc)}
.fl2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tog-row{display:flex;align-items:center;gap:12px;padding:13px;border:1px solid var(--bor2);border-radius:var(--r);margin:2px 0 13px;background:var(--s2)}
.tog-lbl{flex:1;font-size:15px;font-weight:500}
.tog-lbl small{display:block;font-size:12px;color:var(--t2);margin-top:2px;font-weight:400}
.tog{width:48px;height:28px;background:var(--s3);border-radius:14px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:1px solid var(--bor2)}
.tog.on{background:var(--acc);border-color:var(--acc)}
.tog::after{content:'';width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.tog.on::after{left:23px}
.br{display:flex;gap:10px;margin-top:8px}
.bp{flex:1;padding:14px;background:linear-gradient(135deg,#2563eb,#3d8ef8);color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:600;cursor:pointer}
.bs2{flex:1;padding:14px;background:var(--s2);color:var(--t2);border:1px solid var(--bor2);border-radius:var(--r);font-size:16px;cursor:pointer}

/* ── TYPE PICKER ── */
.tg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.tb{padding:13px 6px;border:1px solid var(--bor2);border-radius:var(--r);background:var(--s2);cursor:pointer;text-align:center}
.tb i{font-size:22px;display:block;margin-bottom:5px}
.tb span{font-size:12px;font-weight:600;color:var(--t2)}
.tb.sel-s{border-color:var(--acc);background:rgba(61,142,248,.15)}
.tb.sel-s span{color:var(--acc2)}
.tb.sel-w{border-color:var(--wat);background:var(--wat-bg)}
.tb.sel-w span{color:var(--wat)}
.tb.sel-h{border-color:var(--hea);background:var(--hea-bg)}
.tb.sel-h span{color:var(--hea)}

/* ── BADGES ── */
.bdg{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600;margin-left:5px;vertical-align:middle}
.bdg-w{background:var(--warn-bg);color:var(--warn)}

/* ── TABS ── */
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--bor)}
.tab{flex:1;padding:12px 4px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--acc2);border-bottom-color:var(--acc)}
.tc{display:none}.tc.on{display:block}

/* ── STAT GRID ── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sc{background:var(--s1);border:1px solid var(--bor);border-radius:13px;padding:13px}
.sc .sl{font-size:11px;color:var(--t2);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.sc .sv{font-size:22px;font-weight:700}
.sc .su{font-size:12px;color:var(--t3);margin-left:3px;font-weight:400}

/* ── READINGS ── */
.ri-item{padding:12px 0;border-bottom:1px solid var(--bor)}
.ri-item:last-child{border-bottom:none}
.ri-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ri-date{font-size:13px;color:var(--t2)}
.ri-acts{display:flex;gap:4px}
.rv{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.rv.single{grid-template-columns:1fr}
.rb{background:var(--s2);border:1px solid var(--bor);border-radius:10px;padding:9px 11px}
.rb .rl{font-size:10px;color:var(--t3);margin-bottom:3px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.rb .rn{font-size:15px;font-weight:600}
.rb .rx{font-size:12px;color:var(--acc2);margin-top:2px;font-weight:500}
.rw{grid-column:1/-1;background:var(--warn-bg);border:1px solid rgba(251,191,36,.2);border-radius:10px;padding:9px 11px}
.rw .rl{font-size:10px;color:var(--warn);margin-bottom:3px;font-weight:700;text-transform:uppercase}
.rw .rn{font-size:15px;font-weight:600;color:var(--warn)}
.del-btn{background:var(--err-bg);border:1px solid rgba(248,113,113,.2);cursor:pointer;color:var(--err);padding:7px;border-radius:8px;font-size:15px;display:flex;align-items:center}
.edit-btn{background:var(--s2);border:1px solid var(--bor2);cursor:pointer;color:var(--t2);padding:7px;border-radius:8px;font-size:15px;display:flex;align-items:center}

/* ── COSTS ── */
.pbar{background:var(--s1);border:1px solid var(--bor);border-radius:14px;padding:14px}
.pbar .pl{font-size:11px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:11px}
.pig{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.pf label{font-size:11px;color:var(--t2);margin-bottom:4px;display:block;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.pf input{width:100%;padding:10px 11px;border:1px solid var(--bor2);border-radius:var(--r);font-size:15px;background:var(--s2);color:var(--t1)}
.pf input:focus{outline:none;border-color:var(--acc)}
.sbox{border-radius:13px;padding:14px;margin-bottom:10px;border:1px solid}
.sbox.pos{background:var(--ok-bg);border-color:rgba(52,211,153,.25)}
.sbox.neg{background:var(--err-bg);border-color:rgba(248,113,113,.25)}
.sbox.neu{background:var(--s2);border-color:var(--bor2)}
.sl2{font-size:11px;font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.sl2.pos{color:var(--ok)}.sl2.neg{color:var(--err)}.sl2.neu{color:var(--t2)}
.sv2{font-size:28px;font-weight:800;letter-spacing:-1px}
.sv2.pos{color:var(--ok)}.sv2.neg{color:var(--err)}
.cp{color:var(--ok)}.cn{color:var(--err)}

/* ── SECTION TITLE ── */
.stit{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}

/* ── BACKUP ── */
.bopt{display:flex;align-items:center;gap:13px;padding:14px;background:var(--s2);border:1px solid var(--bor2);border-radius:var(--r);margin-bottom:9px}
.bopt .bi2{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.bopt .bt{font-size:15px;font-weight:600;margin-bottom:2px}
.bopt .bs3{font-size:12px;color:var(--t2)}
</style>
</head>
<body>

<!-- S1: GEBÄUDE -->
<div class="scr on" id="s-b">
  <div class="top">
    <h1>⚡ Zähler<span class="acc-c">App</span></h1>
    <button class="ib" onclick="openM('m-bak')">💾</button>
    <button class="ib" onclick="openM('m-bld')">+</button>
  </div>
  <div class="cnt" id="l-b"></div>
  <button class="fab" onclick="openM('m-bld')">+</button>
</div>

<!-- S2: BEREICHE -->
<div class="scr" id="s-a">
  <div class="top">
    <button class="back" onclick="goTo('s-b')">‹Zurück</button>
    <h1 id="t-a">Bereiche</h1>
    <button class="ib" onclick="openM('m-are')">+</button>
  </div>
  <div class="bc" id="bc-a"></div>
  <div class="cnt" id="l-a"></div>
  <button class="fab" onclick="openM('m-are')">+</button>
</div>

<!-- S3: ZÄHLERTYPEN -->
<div class="scr" id="s-t">
  <div class="top">
    <button class="back" onclick="goTo('s-a')">‹Zurück</button>
    <h1 id="t-t">Zählertypen</h1>
  </div>
  <div class="bc" id="bc-t"></div>
  <div class="cnt" id="l-t"></div>
</div>

<!-- S4: ZÄHLER -->
<div class="scr" id="s-m">
  <div class="top">
    <button class="back" onclick="goTo('s-t')">‹Zurück</button>
    <h1 id="t-m">Zähler</h1>
    <button class="ib" onclick="openM('m-mtr')">+</button>
  </div>
  <div class="bc" id="bc-m"></div>
  <div class="cnt" id="l-m"></div>
  <button class="fab" onclick="openM('m-mtr')">+</button>
</div>

<!-- S5: DETAIL -->
<div class="scr" id="s-d">
  <div class="top">
    <button class="back" onclick="goTo('s-m')">‹Zurück</button>
    <h1 id="t-d">Zähler</h1>
    <button class="ib" onclick="exportPDF()">PDF</button>
    <button class="ib" onclick="openM('m-rdn')">+</button>
  </div>
  <div class="bc" id="bc-d"></div>
  <div style="display:flex;flex-direction:column;flex:1">
    <div class="tabs" id="tab-bar"></div>
    <div class="cnt">
      <div class="tc on" id="tc-r"></div>
      <div class="tc" id="tc-s"></div>
      <div class="tc" id="tc-c"></div>
    </div>
  </div>
  <button class="fab" onclick="openM('m-rdn')">+</button>
</div>

<!-- MODAL: GEBÄUDE -->
<div class="mo" id="m-bld" onclick="closeOnOv(event,'m-bld')">
  <div class="mb">
    <div class="mh"></div>
    <h2 id="h-bld">Gebäude hinzufügen</h2>
    <div class="fl"><label>Name</label><input type="text" id="i-bn" placeholder="z.B. Hauptgebäude"></div>
    <div class="fl"><label>Adresse (optional)</label><input type="text" id="i-ba" placeholder="z.B. Musterstraße 1"></div>
    <div class="br">
      <button class="bs2" onclick="closeM('m-bld')">Abbrechen</button>
      <button class="bp" onclick="saveB()">Speichern</button>
    </div>
  </div>
</div>

<!-- MODAL: BEREICH -->
<div class="mo" id="m-are" onclick="closeOnOv(event,'m-are')">
  <div class="mb">
    <div class="mh"></div>
    <h2 id="h-are">Bereich hinzufügen</h2>
    <div class="fl"><label>Bezeichnung</label><input type="text" id="i-an" placeholder="z.B. Erdgeschoss, Halle 1"></div>
    <div class="fl"><label>Beschreibung (optional)</label><input type="text" id="i-ad" placeholder="z.B. Produktionshalle Nord"></div>
    <div class="br">
      <button class="bs2" onclick="closeM('m-are')">Abbrechen</button>
      <button class="bp" onclick="saveA()">Speichern</button>
    </div>
  </div>
</div>

<!-- MODAL: ZÄHLER -->
<div class="mo" id="m-mtr" onclick="closeOnOv(event,'m-mtr')">
  <div class="mb">
    <div class="mh"></div>
    <h2 id="h-mtr">Zähler hinzufügen</h2>
    <div class="fl"><label>Typ</label>
      <div class="tg">
        <button class="tb sel-s" id="tb-s" onclick="selType('s')"><span style="font-size:22px;display:block;margin-bottom:5px">⚡</span><span>Strom</span></button>
        <button class="tb" id="tb-w" onclick="selType('w')"><span style="font-size:22px;display:block;margin-bottom:5px">💧</span><span>Wasser</span></button>
        <button class="tb" id="tb-h" onclick="selType('h')"><span style="font-size:22px;display:block;margin-bottom:5px">🔥</span><span>Wärme</span></button>
      </div>
    </div>
    <div class="fl"><label>Bezeichnung</label><input type="text" id="i-mn" placeholder="z.B. Hauptzähler"></div>
    <div class="fl"><label>Zählernummer (optional)</label><input type="text" id="i-mz" placeholder="z.B. 1234567890"></div>
    <div class="fl2">
      <div class="fl"><label>Einheit</label><input type="text" id="i-mu" placeholder="kWh, m³, MWh"></div>
      <div class="fl"><label>Nachkommastellen</label><input type="number" id="i-md" value="4" min="0" max="6"></div>
    </div>
    <div id="sf">
      <div class="tog-row">
        <div class="tog-lbl">Wandlerzähler<small>Messwert × Faktor</small></div>
        <button class="tog" id="tog-w" onclick="togW()"></button>
      </div>
      <div id="wf-field" style="display:none" class="fl"><label>Wandlerfaktor</label><input type="number" id="i-wf" value="50" min="1"></div>
      <div class="fl"><label>Register 2 Bezeichnung</label><input type="text" id="i-r2n" placeholder="z.B. 2.8.0 Einspeisung"></div>
    </div>
    <div class="br">
      <button class="bs2" onclick="closeM('m-mtr')">Abbrechen</button>
      <button class="bp" onclick="saveM()">Speichern</button>
    </div>
  </div>
</div>

<!-- MODAL: ABLESUNG NEU -->
<div class="mo" id="m-rdn" onclick="closeOnOv(event,'m-rdn')">
  <div class="mb">
    <div class="mh"></div>
    <h2>Ablesung eintragen</h2>
    <div class="fl"><label>Datum</label><input type="date" id="i-rd"></div>
    <div class="fl"><label id="i-r1l">Zählerstand</label><input type="number" id="i-r1" placeholder="0.0000" step="any"></div>
    <div class="fl" id="i-r2w" style="display:none"><label id="i-r2l">Register 2</label><input type="number" id="i-r2" step="any"></div>
    <div class="br">
      <button class="bs2" onclick="closeM('m-rdn')">Abbrechen</button>
      <button class="bp" onclick="saveR()">Speichern</button>
    </div>
  </div>
</div>

<!-- MODAL: ABLESUNG EDIT -->
<div class="mo" id="m-rde" onclick="closeOnOv(event,'m-rde')">
  <div class="mb">
    <div class="mh"></div>
    <h2>Ablesung bearbeiten</h2>
    <div class="fl"><label>Datum</label><input type="date" id="i-erd"></div>
    <div class="fl"><label id="i-er1l">Zählerstand</label><input type="number" id="i-er1" step="any"></div>
    <div class="fl" id="i-er2w" style="display:none"><label id="i-er2l">Register 2</label><input type="number" id="i-er2" step="any"></div>
    <div class="br">
      <button class="bs2" onclick="closeM('m-rde')">Abbrechen</button>
      <button class="bp" onclick="saveRE()">Speichern</button>
    </div>
  </div>
</div>

<!-- MODAL: BACKUP -->
<div class="mo" id="m-bak" onclick="closeOnOv(event,'m-bak')">
  <div class="mb">
    <div class="mh"></div>
    <h2>Backup & Wiederherstellen</h2>
    <div class="bopt" onclick="expData()" style="cursor:pointer">
      <div class="bi2" style="background:linear-gradient(135deg,#1e3a6e,#2d5aa0);color:#7eb8ff">⬇️</div>
      <div><div class="bt">Backup exportieren</div><div class="bs3">Alle Daten als JSON speichern</div></div>
    </div>
    <label class="bopt" style="cursor:pointer">
      <div class="bi2" style="background:linear-gradient(135deg,#1a3d2e,#1f6645);color:#34d399">⬆️</div>
      <div><div class="bt">Backup importieren</div><div class="bs3">Warnung: überschreibt alle Daten</div></div>
      <input type="file" accept=".json" onchange="impData(event)" style="display:none">
    </label>
    <button class="bs2" onclick="closeM('m-bak')" style="width:100%;margin-top:4px">Schließen</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// DB
// ═══════════════════════════════════════════════════
let DB = JSON.parse(localStorage.getItem('zdb')||'{"buildings":[],"areas":[],"meters":[],"readings":[]}');
if(!DB.areas) DB.areas=[];
let C={b:null,a:null,t:null,m:null};
let mType='s', wOn=false, editId=null;

function sv(){localStorage.setItem('zdb',JSON.stringify(DB));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmN(n,d=4){return Number(n).toLocaleString('de-DE',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmD(d){return new Date(d+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'});}
function fmDS(d){return new Date(d+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});}

// ═══════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════
function goTo(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
  if(id==='s-b') rB();
  if(id==='s-a') rA();
  if(id==='s-t') rT();
  if(id==='s-m') rM();
}

// ═══════════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════════
function openM(id){
  if(id==='m-rdn'){
    document.getElementById('i-rd').value=new Date().toISOString().slice(0,10);
    document.getElementById('i-r1').value='';document.getElementById('i-r2').value='';
    const m=C.m;
    document.getElementById('i-r1l').textContent=(m.type==='s'?'1.8.0 Bezug':'Zählerstand')+' ('+m.unit+')';
    const h2=m.type==='s'&&m.reg2;
    document.getElementById('i-r2w').style.display=h2?'block':'none';
    if(h2) document.getElementById('i-r2l').textContent=m.reg2+' ('+m.unit+')';
  }
  if(id==='m-mtr'&&!editId){
    document.getElementById('i-mn').value='';document.getElementById('i-mz').value='';
    document.getElementById('i-r2n').value='2.8.0 Einspeisung';
    wOn=false;document.getElementById('tog-w').classList.remove('on');
    document.getElementById('wf-field').style.display='none';
    document.getElementById('i-wf').value='50';
    selType(C.t||'s');
    const ud={s:'kWh',w:'m³',h:'MWh'};
    document.getElementById('i-mu').value=ud[C.t]||'kWh';
    document.getElementById('i-md').value='4';
    document.getElementById('h-mtr').textContent='Zähler hinzufügen';
  }
  if(id==='m-bld'&&!editId){document.getElementById('i-bn').value='';document.getElementById('i-ba').value='';document.getElementById('h-bld').textContent='Gebäude hinzufügen';}
  if(id==='m-are'&&!editId){document.getElementById('i-an').value='';document.getElementById('i-ad').value='';document.getElementById('h-are').textContent='Bereich hinzufügen';}
  document.getElementById(id).classList.add('on');
}
function closeM(id){document.getElementById(id).classList.remove('on');if(editId&&['m-bld','m-are','m-mtr','m-rde'].includes(id))editId=null;}
function closeOnOv(e,id){if(e.target.classList.contains('mo'))closeM(id);}
function selType(t){
  mType=t;
  ['s','w','h'].forEach(x=>{
    const b=document.getElementById('tb-'+x);
    b.className='tb'+(t===x?' sel-'+x:'');
  });
  document.getElementById('sf').style.display=t==='s'?'block':'none';
}
function togW(){wOn=!wOn;document.getElementById('tog-w').classList.toggle('on',wOn);document.getElementById('wf-field').style.display=wOn?'block':'none';}

// ═══════════════════════════════════════════════════
// SAVE
// ═══════════════════════════════════════════════════
function saveB(){
  const n=document.getElementById('i-bn').value.trim();
  if(!n)return alert('Bitte einen Namen eingeben.');
  const a=document.getElementById('i-ba').value.trim();
  if(editId){const b=DB.buildings.find(x=>x.id===editId);b.name=n;b.addr=a;editId=null;}
  else DB.buildings.push({id:uid(),name:n,addr:a});
  sv();closeM('m-bld');rB();
}
function saveA(){
  const n=document.getElementById('i-an').value.trim();
  if(!n)return alert('Bitte eine Bezeichnung eingeben.');
  const d=document.getElementById('i-ad').value.trim();
  if(editId){const a=DB.areas.find(x=>x.id===editId);a.name=n;a.desc=d;editId=null;}
  else DB.areas.push({id:uid(),bId:C.b.id,name:n,desc:d});
  sv();closeM('m-are');rA();
}
function saveM(){
  const n=document.getElementById('i-mn').value.trim();
  if(!n)return alert('Bitte eine Bezeichnung eingeben.');
  const obj={
    name:n,zid:document.getElementById('i-mz').value.trim(),
    unit:document.getElementById('i-mu').value.trim()||'kWh',
    decimals:parseInt(document.getElementById('i-md').value)||4,
    type:mType,
    wandler:mType==='s'?wOn:false,
    factor:mType==='s'&&wOn?parseInt(document.getElementById('i-wf').value)||50:1,
    reg2:mType==='s'?document.getElementById('i-r2n').value.trim():null
  };
  if(editId){Object.assign(DB.meters.find(x=>x.id===editId),obj);editId=null;}
  else DB.meters.push({id:uid(),aId:C.a.id,bId:C.b.id,...obj});
  sv();closeM('m-mtr');rM();
}
function saveR(){
  const date=document.getElementById('i-rd').value;
  const r1=parseFloat(document.getElementById('i-r1').value);
  if(!date||isNaN(r1))return alert('Bitte alle Felder ausfüllen.');
  const r2v=document.getElementById('i-r2').value;
  const r2=C.m.reg2&&r2v!==''?parseFloat(r2v):null;
  // Plausibilitätsprüfung
  const prev=DB.readings.filter(r=>r.mId===C.m.id&&r.date<=date).slice().sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(prev&&r1<prev.r1){
    if(!confirm(`Warnung: Zählerstand R1 (${r1}) ist kleiner als vorherige Ablesung (${prev.r1}).
Trotzdem speichern?`))return;
  }
  if(prev&&r2!==null&&prev.r2!==null&&r2<prev.r2){
    if(!confirm(`Warnung: Zählerstand R2 (${r2}) ist kleiner als vorherige Ablesung (${prev.r2}).
Trotzdem speichern?`))return;
  }
  DB.readings.push({id:uid(),mId:C.m.id,date,r1,r2});
  DB.readings.sort((a,b)=>a.date.localeCompare(b.date));
  sv();closeM('m-rdn');rRdn();
}
function saveRE(){
  const date=document.getElementById('i-erd').value;
  const r1=parseFloat(document.getElementById('i-er1').value);
  if(!date||isNaN(r1))return alert('Bitte alle Felder ausfüllen.');
  const r2v=document.getElementById('i-er2').value;
  const r2=C.m.reg2&&r2v!==''?parseFloat(r2v):null;
  const r=DB.readings.find(x=>x.id===editId);
  if(r){r.date=date;r.r1=r1;r.r2=r2;}
  DB.readings.sort((a,b)=>a.date.localeCompare(b.date));
  sv();closeM('m-rde');editId=null;rRdn();
}

// ═══════════════════════════════════════════════════
// EDIT / DELETE
// ═══════════════════════════════════════════════════
function editB(id){editId=id;const b=DB.buildings.find(x=>x.id===id);document.getElementById('i-bn').value=b.name;document.getElementById('i-ba').value=b.addr||'';document.getElementById('h-bld').textContent='Gebäude bearbeiten';openM('m-bld');}
function delB(id){
  const b=DB.buildings.find(x=>x.id===id);
  const ac=DB.areas.filter(a=>a.bId===id).length;
  if(!confirm(`"${b.name}" löschen?${ac?' Alle '+ac+' Bereiche und Zähler werden gelöscht!':''}`))return;
  const aIds=DB.areas.filter(a=>a.bId===id).map(a=>a.id);
  const mIds=DB.meters.filter(m=>aIds.includes(m.aId)).map(m=>m.id);
  DB.readings=DB.readings.filter(r=>!mIds.includes(r.mId));
  DB.meters=DB.meters.filter(m=>!aIds.includes(m.aId));
  DB.areas=DB.areas.filter(a=>a.bId!==id);
  DB.buildings=DB.buildings.filter(x=>x.id!==id);
  sv();rB();
}
function editA(id){editId=id;const a=DB.areas.find(x=>x.id===id);document.getElementById('i-an').value=a.name;document.getElementById('i-ad').value=a.desc||'';document.getElementById('h-are').textContent='Bereich bearbeiten';openM('m-are');}
function delA(id){
  const a=DB.areas.find(x=>x.id===id);
  const mc=DB.meters.filter(m=>m.aId===id).length;
  if(!confirm(`"${a.name}" löschen?${mc?' Alle '+mc+' Zähler werden gelöscht!':''}`))return;
  const mIds=DB.meters.filter(m=>m.aId===id).map(m=>m.id);
  DB.readings=DB.readings.filter(r=>!mIds.includes(r.mId));
  DB.meters=DB.meters.filter(m=>m.aId!==id);
  DB.areas=DB.areas.filter(x=>x.id!==id);
  sv();rA();
}
function editMtr(id){
  editId=id;const m=DB.meters.find(x=>x.id===id);
  document.getElementById('h-mtr').textContent='Zähler bearbeiten';
  selType(m.type);
  document.getElementById('i-mn').value=m.name;document.getElementById('i-mz').value=m.zid||'';
  document.getElementById('i-mu').value=m.unit||'kWh';document.getElementById('i-md').value=m.decimals||4;
  document.getElementById('i-r2n').value=m.reg2||'';
  wOn=m.wandler||false;document.getElementById('tog-w').classList.toggle('on',wOn);
  document.getElementById('wf-field').style.display=wOn?'block':'none';
  document.getElementById('i-wf').value=m.factor||50;
  openM('m-mtr');
}
function delMtr(id){
  const m=DB.meters.find(x=>x.id===id);
  const rc=DB.readings.filter(r=>r.mId===id).length;
  if(!confirm(`"${m.name}" löschen?${rc?' Alle '+rc+' Ablesungen werden gelöscht!':''}`))return;
  DB.readings=DB.readings.filter(r=>r.mId!==id);DB.meters=DB.meters.filter(x=>x.id!==id);sv();rM();
}
function editRdn(id){
  editId=id;const r=DB.readings.find(x=>x.id===id);const m=C.m;
  document.getElementById('i-erd').value=r.date;document.getElementById('i-er1').value=r.r1;
  document.getElementById('i-er1l').textContent=(m.type==='s'?'1.8.0 Bezug':'Zählerstand')+' ('+m.unit+')';
  const h2=m.type==='s'&&m.reg2;
  document.getElementById('i-er2w').style.display=h2?'block':'none';
  if(h2){document.getElementById('i-er2l').textContent=m.reg2+' ('+m.unit+')';document.getElementById('i-er2').value=r.r2||'';}
  openM('m-rde');
}
function delRdn(id){if(!confirm('Ablesung löschen?'))return;DB.readings=DB.readings.filter(r=>r.id!==id);sv();rRdn();}

function rB(){
  const el=document.getElementById('l-b');
  if(!DB.buildings.length){el.innerHTML='<div class="emp">🏚️<p>Noch keine Gebäude.<br>Tippe auf + um loszulegen.</p></div>';return;}
  el.innerHTML='<div class="stit">Gebäude</div><div class="card">'+DB.buildings.map(b=>{
    const ac=DB.areas.filter(a=>a.bId===b.id).length;
    return`<div class="cr" onclick="opB('${b.id}')">
      <div class="iw ib-bld">🏢</div>
      <div class="ri"><div class="rt">${esc(b.name)}</div><div class="rs">${esc(b.addr)||'Keine Adresse'} · ${ac} Bereiche</div></div>
      <div class="ra" onclick="event.stopPropagation()">
        <button class="eb" onclick="editB('${b.id}')">✏️</button>
        <button class="db" onclick="delB('${b.id}')">🗑️</button>
      </div>
      ›</div>`;
  }).join('')+'</div>';
}
function opB(id){C.b=DB.buildings.find(x=>x.id===id);goTo('s-a');}

function rA(){
  document.getElementById('t-a').textContent=C.b.name;

function opA(id){C.a=DB.areas.find(x=>x.id===id);goTo('s-t');}

function opT(t){C.t=t;goTo('s-m');}

function opM(id){
  C.m=DB.meters.find(x=>x.id===id);
  const i=tInfo(C.m.type);
  document.getElementById('t-d').textContent=C.m.name;
  document.getElementById('bc-d').innerHTML=`<span class="bi">${esc(C.b.name)}</span><span class="bs"> › </span><span class="bi">${esc(C.a.name)}</span><span class="bs"> › </span><span class="bi">${i.lbl}</span><span class="bs"> › </span><span class="bx">${esc(C.m.name)}</span>`;
  const hc=C.m.type==='s';
  document.getElementById('tab-bar').innerHTML=
    `<button class="tab on" onclick="swTab('r')">Ablesungen</button>
     <button class="tab" onclick="swTab('s')">Statistik</button>`+
    (hc?`<button class="tab" onclick="swTab('c')">Kosten</button>`:'');
  document.querySelectorAll('.tc').forEach(t=>{t.classList.remove('on');t.innerHTML='';});
  document.getElementById('tc-r').classList.add('on');
  goTo('s-d');rRdn();

function swTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.remove('on'));
  document.querySelectorAll('.tc').forEach(el=>el.classList.remove('on'));
  const tabs=['r','s','c'];
  document.querySelectorAll('.tab')[tabs.indexOf(t)].classList.add('on');
  document.getElementById('tc-'+t).classList.add('on');
  if(t==='r')rRdn();else if(t==='s')rStat();else rCost();
}

function rRdn(){
  const el=document.getElementById('tc-r');
  const m=C.m;
  const rdns=DB.readings.filter(r=>r.mId===m.id).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const dec=m.decimals||4;const f=m.wandler?m.factor:1;
  if(!rdns.length){el.innerHTML='<div class="emp">📋<p>Keine Ablesungen vorhanden.</p></div>';return;}
  el.innerHTML=rdns.map(r=>{
    const h2=m.reg2&&r.r2!==null&&r.r2!==undefined;
    return`<div class="ri-item">
      <div class="ri-hd">
        <span class="ri-date">📅${fmD(r.date)}</span>
        <div class="ri-acts">
          <button class="edit-btn" onclick="editRdn('${r.id}')">✏️</button>
          <button class="del-btn" onclick="delRdn('${r.id}')">🗑️</button>
        </div>
      </div>
      <div class="rv${h2?'':' single'}">
        <div class="rb"><div class="rl">${m.type==='s'?'1.8.0 Bezug':'Zählerstand'}</div>
          <div class="rn">${fmN(r.r1,dec)} ${m.unit}</div>
          ${m.wandler?`<div class="rx">→ ${fmN(r.r1*f,dec)} ${m.unit}</div>`:''}</div>
        ${h2?`<div class="rb"><div class="rl">2.8.0 Einspeisung</div>
          <div class="rn">${fmN(r.r2,dec)} ${m.unit}</div>
          ${m.wandler?`<div class="rx">→ ${fmN(r.r2*f,dec)} ${m.unit}</div>`:''}</div>`:''}
        ${m.wandler?`<div class="rw"><div class="rl">Hochgerechnet ×${f}</div>
          <div class="rn">${fmN(r.r1*f,dec)}${h2?' / '+fmN(r.r2*f,dec):''} ${m.unit}</div></div>`:''}
      </div></div>`;
  }).join('');
}

function calcP(){
  const m=C.m;
  const rdns=DB.readings.filter(r=>r.mId===m.id).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const f=m.wandler?m.factor:1;
  let rows=[],t1=0,t2=0,tD=0;
  for(let i=1;i<rdns.length;i++){
    const p=rdns[i-1],c=rdns[i];
    const days=(new Date(c.date+'T12:00:00')-new Date(p.date+'T12:00:00'))/(864e5);
    if(days<=0)continue;
    const d1=(c.r1-p.r1)*f;
    const d2=m.reg2&&c.r2!==null&&p.r2!==null?(c.r2-p.r2)*f:null;
    t1+=d1;if(d2!==null)t2+=d2;tD+=days;
    rows.push({von:fmDS(p.date),bis:fmDS(c.date),lbl:new Date(c.date+'T12:00:00').toLocaleDateString('de-DE',{month:'short',year:'2-digit'}),days:Math.round(days),d1,d2,pd1:d1/days,pd2:d2!==null?d2/days:null});
  }
  return{rows,t1,t2,tD,last:rows[rows.length-1]};
}

function rStat(){
  const el=document.getElementById('tc-s');
  const m=C.m;const{rows,t1,t2,tD,last}=calcP();
  if(!rows.length){el.innerHTML='<div class="emp">📊<p>Mindestens 2 Ablesungen nötig.</p></div>';return;}
  const avgD1=last.pd1,avgD2=last.pd2;
  el.innerHTML=`
    <div class="stit">Ø Letzte Periode (${last.days} Tage: ${last.von}–${last.bis})</div>
    <div class="sg">
      <div class="sc"><div class="sl">Ø Tag${m.reg2?' · 1.8.0':''}</div><div class="sv">${avgD1.toFixed(2)}<span class="su">${m.unit}</span></div></div>
      <div class="sc"><div class="sl">Ø Monat${m.reg2?' · 1.8.0':''}</div><div class="sv">${(avgD1*30.44).toFixed(0)}<span class="su">${m.unit}</span></div></div>
      ${avgD2!==null?`<div class="sc"><div class="sl">Ø Tag · 2.8.0</div><div class="sv">${avgD2.toFixed(2)}<span class="su">${m.unit}</span></div></div>
      <div class="sc"><div class="sl">Ø Monat · 2.8.0</div><div class="sv">${(avgD2*30.44).toFixed(0)}<span class="su">${m.unit}</span></div></div>`:''}
    </div>
    <div class="stit" style="margin-top:14px">Alle Perioden</div>
    <div class="card">${rows.slice().reverse().map(r=>`<div class="ri-item">
      <div class="ri-hd"><span style="font-weight:600;color:var(--t1)">${r.lbl} · ${r.days} Tage</span></div>
      <div class="rv${r.d2===null?' single':''}">
        <div class="rb"><div class="rl">1.8.0 Bezug</div>
          <div class="rn">${r.d1.toFixed(2)} ${m.unit}</div>
          <div class="rx">${r.pd1.toFixed(3)} ${m.unit}/Tag</div></div>
        ${r.d2!==null?`<div class="rb"><div class="rl">2.8.0 Einspeisung</div>
          <div class="rn">${r.d2.toFixed(2)} ${m.unit}</div>
          <div class="rx">${r.pd2.toFixed(3)} ${m.unit}/Tag</div></div>`:''}
      </div></div>`).join('')}</div>`;
}

function gPrices(id){try{return JSON.parse(localStorage.getItem('pr_'+id))||{buy:0,sell:0};}catch(e){return{buy:0,sell:0};}}
function sPrices(id,b,s){localStorage.setItem('pr_'+id,JSON.stringify({buy:parseFloat(b)||0,sell:parseFloat(s)||0}));}

function rCost(){
  const el=document.getElementById('tc-c');const m=C.m;
  const pr=gPrices(m.id);const{rows}=calcP();
  let html=`<div class="pbar"><div class="pl">€Preise für diesen Zähler</div>
    <div class="pig">
      <div class="pf"><label>Strompreis (ct/${m.unit})</label><input type="number" id="i-buy" value="${pr.buy}" step="0.01" placeholder="z.B. 32.50" onchange="sPrices('${m.id}',this.value,document.getElementById('i-sell').value);rCost()"></div>
      <div class="pf"><label>Einspeiseverg. (ct/${m.unit})</label><input type="number" id="i-sell" value="${pr.sell}" step="0.01" placeholder="z.B. 8.20" onchange="sPrices('${m.id}',document.getElementById('i-buy').value,this.value);rCost()"></div>
    </div></div>`;
  if(!rows.length){el.innerHTML=html+'<div class="emp" style="padding:28px 0">📊<p>Mindestens 2 Ablesungen nötig.</p></div>';return;}
  let tK=0,tE=0;
  const cr=rows.map(r=>{
    const d1=Math.max(0,r.d1); // negative Verbräuche (Rückläufer) als 0
    const d2=r.d2!==null?Math.max(0,r.d2):null;
    const k=d1*(pr.buy/100);
    const e=d2!==null?d2*(pr.sell/100):0;
    const s=e-k; // Saldo = Ertrag - Kosten
    tK+=k;tE+=e;
    return{...r,k,e,s};
  });
  const tS=tE-tK;const sc=tS>0?'pos':tS<0?'neg':'neu';
  html+=`<div class="sbox ${sc}"><div class="sl2 ${sc}">${tS>=0?'Gesamtertrag (Einspeisung überwiegt)':'Gesamtkosten (Bezug überwiegt)'}</div>
    <div class="sv2 ${sc}">${tS>=0?'+':''}${tS.toFixed(2)} €</div>
    <div style="font-size:12px;margin-top:4px;opacity:.8">Kosten: ${tK.toFixed(2)} € · Ertrag: ${tE.toFixed(2)} €</div></div>
  <div class="stit">Aufstellung je Periode</div>
  <div class="card">${cr.slice().reverse().map(r=>{
    const sc2=r.s>0?'cp':r.s<0?'cn':'';
    return`<div class="ri-item">
      <div class="ri-hd"><span style="font-weight:600;color:var(--t1)">${r.lbl} · ${r.days} Tage</span>
        <span class="${sc2}" style="font-weight:700;font-size:15px">${r.s>=0?'+':''}${r.s.toFixed(2)} €</span></div>
      <div class="rv${r.d2===null?' single':''}">
        <div class="rb"><div class="rl">1.8.0 Bezug</div><div class="rn">${r.d1.toFixed(2)} ${m.unit}</div><div class="rx cn">−${r.k.toFixed(2)} €</div></div>
        ${r.d2!==null?`<div class="rb"><div class="rl">2.8.0 Einspeisung</div><div class="rn">${r.d2.toFixed(2)} ${m.unit}</div><div class="rx cp">+${r.e.toFixed(2)} €</div></div>`:''}
      </div></div>`;
  }).join('')}</div>`;
  el.innerHTML=html;
}

// ═══════════════════════════════════════════════════
// PDF EXPORT - Tabellarisch
// ═══════════════════════════════════════════════════
function exportPDF(){
  if(typeof window.jspdf==='undefined'){alert('PDF-Bibliothek lädt noch.');return;}
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const m=C.m;
  const rdns=DB.readings.filter(r=>r.mId===m.id).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const{rows,t1,t2,tD,last}=calcP();
  const pr=gPrices(m.id);
  const f=m.wandler?m.factor:1;
  const dec=m.decimals||4;
  const i=tInfo(m.type);
  const cols={s:[26,115,232],w:[8,145,178],h:[194,65,12]}[m.type];
  const[cr,cg,cb]=cols;
  const M=14,W=210-M*2;

  // ── Header ──
  doc.setFillColor(cr,cg,cb);doc.rect(0,0,210,32,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(20);doc.setFont('helvetica','bold');
  doc.text(i.lbl+'zähler Auswertung',M,13);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text(`${C.b.name} › ${C.a.name} › ${m.name}`,M,20);
  doc.text('Erstellt: '+fmD(new Date().toISOString().slice(0,10)),M,26);

  // ── Zähler Info Box ──
  let y=38;
  doc.setFillColor(240,244,255);doc.roundedRect(M,y,W,22,3,3,'F');
  doc.setTextColor(30,30,50);doc.setFontSize(12);doc.setFont('helvetica','bold');doc.text(m.name,M+5,y+8);
  doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(90,100,130);
  const infoParts=[m.zid?'Zähler-Nr: '+m.zid:'',m.wandler?'Wandlerzähler ×'+m.factor:'Direktmessung','Einheit: '+m.unit,pr.buy>0?`Preis: ${pr.buy} ct/${m.unit}  |  Vergütung: ${pr.sell} ct/${m.unit}`:''].filter(Boolean);
  doc.text(infoParts.join('   '),M+5,y+15);
  y+=27;

  // ── Kennzahlen Tabelle ──
  if(last){
    doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(30,30,50);
    doc.text('KENNZAHLEN',M,y+5);y+=9;
    const kRows=[
      ['Ø Verbrauch/Tag (letzte Periode)',`${last.pd1.toFixed(3)} ${m.unit}`,last.pd2!==null?`${last.pd2.toFixed(3)} ${m.unit}`:'–'],
      ['Ø Verbrauch/Monat (letzte Periode)',`${(last.pd1*30.44).toFixed(1)} ${m.unit}`,last.pd2!==null?`${(last.pd2*30.44).toFixed(1)} ${m.unit}`:'–'],
      ['Gesamtverbrauch (alle Perioden)',`${t1.toFixed(2)} ${m.unit}`,t2>0?`${t2.toFixed(2)} ${m.unit}`:'–'],
    ];
    if(pr.buy>0){
      const tK=rows.reduce((s,r)=>s+Math.max(0,r.d1)*(pr.buy/100),0);
      const tE=rows.reduce((s,r)=>s+(r.d2!==null?Math.max(0,r.d2)*(pr.sell/100):0),0);
      kRows.push(['Gesamtkosten Bezug',`${tK.toFixed(2)} €`,'']);
      if(pr.sell>0)kRows.push(['Gesamtertrag Einspeisung',`${tE.toFixed(2)} €`,'']);
      kRows.push(['Saldo',(tE-tK>=0?'+':'')+(tE-tK).toFixed(2)+' €','']);
    }
    doc.autoTable({
      startY:y,margin:{left:M,right:M},
      head:[['Kennzahl','1.8.0 Bezug','2.8.0 Einspeisung']],
      body:kRows,
      theme:'grid',
      headStyles:{fillColor:[cr,cg,cb],textColor:255,fontSize:8.5,fontStyle:'bold'},
      bodyStyles:{fontSize:8.5,textColor:[40,40,60]},
      alternateRowStyles:{fillColor:[248,249,252]},
      columnStyles:{0:{cellWidth:90},1:{cellWidth:50},2:{cellWidth:42}},
    });
    y=doc.lastAutoTable.finalY+8;
  }

  // ── Verbrauch je Periode ──
  if(rows.length){
    if(y>240){doc.addPage();y=15;}
    doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(30,30,50);
    doc.text('VERBRAUCH JE PERIODE',M,y+5);y+=9;
    const hasR2=m.reg2&&rows.some(r=>r.d2!==null);
    const hasCost=pr.buy>0;
    const pHead=hasR2
      ? ['Zeitraum','Tage',`1.8.0 Bezug (${m.unit})`,`2.8.0 Einspeisung (${m.unit})`,'Ø Tag','Kosten €','Ertrag €','Saldo €']
      : ['Zeitraum','Tage',`Verbrauch (${m.unit})`,'Ø Tag/'+m.unit,hasCost?'Kosten €':''];
    const pBody=rows.slice().reverse().map(r=>{
      const _d1=Math.max(0,r.d1);
      const _d2=r.d2!==null?Math.max(0,r.d2):null;
      const k=(_d1*(pr.buy/100)).toFixed(2);
      const e=_d2!==null?(_d2*(pr.sell/100)).toFixed(2):'–';
      const s=_d2!==null?((_d2*(pr.sell/100))-(_d1*(pr.buy/100))).toFixed(2):'–';
      return hasR2
        ? [`${r.von}–${r.bis}`,r.days,r.d1.toFixed(2),r.d2!==null?r.d2.toFixed(2):'–',r.pd1.toFixed(3),hasCost?k:'',hasCost?e:'',hasCost?s:'']
        : [`${r.von}–${r.bis}`,r.days,r.d1.toFixed(2),r.pd1.toFixed(3),hasCost?k:''];
    });
    doc.autoTable({
      startY:y,margin:{left:M,right:M},
      head:[pHead.filter(Boolean)],
      body:pBody,
      theme:'grid',
      headStyles:{fillColor:[cr,cg,cb],textColor:255,fontSize:8,fontStyle:'bold'},
      bodyStyles:{fontSize:8,textColor:[40,40,60]},
      alternateRowStyles:{fillColor:[248,249,252]},
    });
    y=doc.lastAutoTable.finalY+8;
  }

  // ── Alle Ablesungen ──
  if(rdns.length){
    if(y>240){doc.addPage();y=15;}
    doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(30,30,50);
    doc.text('ALLE ABLESUNGEN',M,y+5);y+=9;
    const hasR2=m.reg2&&rdns.some(r=>r.r2!==null);
    const aHead=m.wandler
      ?(hasR2?['Datum','R1 abgelesen','R1 ×'+m.factor,'R2 abgelesen','R2 ×'+m.factor]:['Datum','Abgelesen','×'+m.factor])
      :(hasR2?['Datum','R1 ('+m.unit+')','R2 ('+m.unit+')']:['Datum','Zählerstand ('+m.unit+')']);
    const aBody=rdns.slice().reverse().map(r=>{
      const ds=fmDS(r.date);
      return m.wandler
        ?(hasR2?[ds,r.r1.toFixed(dec),(r.r1*f).toFixed(dec),r.r2!==null?r.r2.toFixed(dec):'–',r.r2!==null?(r.r2*f).toFixed(dec):'–']
          :[ds,r.r1.toFixed(dec),(r.r1*f).toFixed(dec)])
        :(hasR2?[ds,r.r1.toFixed(dec),r.r2!==null?r.r2.toFixed(dec):'–']:[ds,r.r1.toFixed(dec)]);
    });
    doc.autoTable({
      startY:y,margin:{left:M,right:M},
      head:[aHead],body:aBody,theme:'grid',
      headStyles:{fillColor:[cr,cg,cb],textColor:255,fontSize:8.5,fontStyle:'bold'},
      bodyStyles:{fontSize:8.5,textColor:[40,40,60]},
      alternateRowStyles:{fillColor:[248,249,252]},
    });
  }

  // ── Footer ──
  const pc=doc.getNumberOfPages();
  for(let p=1;p<=pc;p++){
    doc.setPage(p);
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(170,170,190);
    doc.text('ZählerApp · '+m.name,M,292);
    doc.text(`Seite ${p} / ${pc}`,210-M,292,{align:'right'});
  }

  doc.save(`Zaehler-${m.name.replace(/[^a-zA-Z0-9]/g,'-')}-${new Date().toISOString().slice(0,10)}.pdf`);
}

// BACKUP
// ═══════════════════════════════════════════════════
function expData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='zaehler-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function impData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.buildings||!d.meters||!d.readings)throw new Error('Ungültiges Format');
      if(!confirm('Alle Daten überschreiben?'))return;
      DB=d;if(!DB.areas)DB.areas=[];
      sv();closeM('m-bak');rB();
      alert(`Import OK: ${d.buildings.length} Gebäude, ${(d.areas||[]).length} Bereiche, ${d.meters.length} Zähler, ${d.readings.length} Ablesungen`);
    }catch(err){alert('Fehler: '+err.message);}
  };
  reader.readAsText(file);
}

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
